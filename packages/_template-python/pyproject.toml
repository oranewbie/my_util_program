[project]
name = "template-python"
version = "0.1.0"
description = "Python 패키지 시작 템플릿 — 새 util을 만들 때 이 폴더를 복사해서 시작"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

# CLI 진입점 예시 — 새 패키지에서는 이름/경로를 바꿔 사용
[project.scripts]
template-python = "template_python.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/template_python"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
